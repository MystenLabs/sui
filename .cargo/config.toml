[alias]
# Run clippy on all targets and features. The project-wide lint set comes from
# `[workspace.lints]` in the root Cargo.toml; every workspace member opts in with
# `[lints] workspace = true` (enforced by `cargo xlint`). Extra cargo options can
# be appended, e.g. `cargo xclippy -p sui-core` or `cargo xclippy -- -D warnings`.
xclippy = ["clippy", "--all-targets", "--all-features"]
xlint = "run --package x --bin x -- lint"
xtest = "run --package x --bin x -- external-crates-tests"

# Configuration specifically for running clippy on `external-crates/move/`.
# Some of these allows are to avoid code churn; others are filed as issues on the `sui` repo now.
move-clippy = [
    "clippy",
    "--all-targets",
    "--",
    "-Wclippy::all",
    "-Wclippy::disallowed_methods",
    "-Wclippy::disallowed_macros",
    "-Aclippy::upper_case_acronyms",
    "-Aclippy::type_complexity",
    "-Aclippy::new_without_default",
    "-Aclippy::question_mark",
    "-Aclippy::unnecessary_get_then_check",
    "-Aclippy::needless_borrows_for_generic_args",
    "-Aclippy::collapsible_match",
]

[build]
rustflags = ["-C", "force-frame-pointers=yes", "-C", "force-unwind-tables=yes", "-A", "unknown_lints", "-A", "mismatched_lifetime_syntaxes"]

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-args=/STACK:8388608"] # increase stack size to 8MB for Windows to avoid stack overflow in main thread

