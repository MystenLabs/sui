experimental = ["setup-scripts"]

[profile.ci]
# Print output for failing tests only when they fail.
failure-output = "immediate"
# Show skipped tests in the CI output.
status-level = "skip"
# Do not cancel the test run on the first failure.
fail-fast = false
# Retry failing tests in order to not block builds on flaky tests
retries = 3
# Timeout tests after 4 minutes
slow-timeout = { period = "60s", terminate-after = 5 }

[profile.simtestnightly]
# Print out output for failing tests as soon as they fail, and also at the end
# of the run (for easy scrollability).
failure-output = "immediate"
# Show skipped tests in the CI output.
status-level = "fail"
# Do not cancel the test run on the first failure.
fail-fast = false
# Mark tests as slow after 30m, terminate after 1.5h
slow-timeout = { period = "30m", terminate-after = 3 }

[profile.ci.junit]
path = "junit.xml"

# Start a shared test cluster for shell_tests::with_network tests.
# The setup script starts `sui start --with-faucet` and writes the config dir to NEXTEST_ENV.
[script.start-cluster]
command = 'crates/sui/tests/start-test-cluster.sh'
slow-timeout = { period = "120s", terminate-after = 3 }

[[profile.default.scripts]]
filter = 'package(sui) & test(shell_tests::with_network)'
platform = 'cfg(unix)'
setup = ['start-cluster']
