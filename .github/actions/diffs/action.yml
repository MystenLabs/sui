name: Detect Changes
description: Defines variables indicating the parts of the code that changed
outputs:
  isDoc:
    description: True when changes happened to some documentation
    value: "${{ steps.diff.outputs.isDoc }}"
  isOldDoc:
    description: True when changes happened to old doc folder
    value: "${{ steps.diff.outputs.isOldDoc }}"    
  isRust:
    description: True when changes happened to the Rust code
    value: "${{ steps.diff.outputs.isRust == 'true' && steps.markdown_only.outputs.isNonFrameworkMarkdownOnly != 'true' }}"
  isMove:
    description: True when changes happened to the Move code
    value: "${{ steps.diff.outputs.isMove == 'true' && steps.markdown_only.outputs.isNonFrameworkMarkdownOnly != 'true' }}"
  isSolidity:
    description: True when changes happened to the Solidity code
    value: "${{ steps.diff.outputs.isSolidity }}"
  isReleaseNotesEligible:
    description: True when changes happened in Release Notes eligible paths
    value: "${{ steps.diff.outputs.isReleaseNotesEligible }}"
  isMoveAutoFormatter:
    description: True when changes happened in MoveAutoFormatter code
    value: "${{ steps.diff.outputs.isMoveAutoFormatter }}"
  isMoveAnalyzerTraceAdapter:
    description: True when changes happened in Trace Adapter
    value: "${{ steps.diff.outputs.isMoveAnalyzerTraceAdapter }}"
  isExamples:
    description: True when changes happened in examples/ directory
    value: "${{ steps.diff.outputs.isExamples }}"
  isReleaseNotesScript:
    description: True when changes happened to release notes scripts
    value: "${{ steps.diff.outputs.isReleaseNotesScript }}"

runs:
  using: composite
  steps:
  - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
  - name: Detect Changes
    uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # pin@v3.0.2
    id: diff
    with:
      filters: |
        isRust:
          - 'consensus/**'
          - 'crates/**'
          - 'external-crates/**'
          - 'sui-execution/**'
          - '.github/workflows/cargo-llvm-cov.yml'
          - '.github/workflows/rust.yml'
          - '.github/workflows/external.yml'
          - 'Cargo.lock'
          - 'Cargo.toml'
          - 'deny.toml'
          - 'rust-toolchain.toml'
          - 'rustfmt.toml'
        isDoc:
          - 'docs/content/**'
          - '*.mdx'
          - '.github/workflows/docs.yml'
        isOldDoc:
          - 'doc/**'
          - '*.md'  
        isMove:
          - 'crates/sui-framework/**'
          - 'crates/sui-framework-build/**'
          - 'crates/sui-framework-tests/**'
          - 'crates/sui_move/**'
          - 'Cargo.toml'
          - 'examples/**'
          - 'sui_programmability/**'
        isSolidity:
          - 'bridge/evm/**'
        isReleaseNotesEligible:
          - 'consensus/**'
          - 'crates/**'
          - 'dashboards/**'
          - 'doc/**'
          - 'docker/**'
          - 'external-crates/**'
          - 'kiosk/**'
          - 'nre/**'
          - 'sui-execution/**'
        isMoveAutoFormatter:
          - 'external-crates/move/crates/move-analyzer/prettier-plugin/**'
        isMoveAnalyzerTraceAdapter:
          - 'external-crates/move/crates/move-analyzer/trace-adapter/**'
        isExamples:
          - 'examples/**'
        isReleaseNotesScript:
          - 'scripts/release_notes.py'
          - 'scripts/release_notes_test.py'
  - name: List Changed Files
    uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # pin@v3.0.2
    id: changed_files
    with:
      list-files: shell
      filters: |
        all:
          - '**'
          - '.*'
          - '.*/**'
          - '**/.*'
          - '**/.*/**'
  - name: Detect Markdown-only Changes
    id: markdown_only
    shell: bash
    run: |
      set -euo pipefail

      changed_files=(${{ steps.changed_files.outputs.all_files }})
      is_non_framework_markdown_only=true

      if [ ${#changed_files[@]} -eq 0 ]; then
        is_non_framework_markdown_only=false
      fi

      # These dirs contain .md files consumed by Move package builds /
      # doc snapshot tests, so markdown changes here must still run CI. 
      for file in "${changed_files[@]}"; do
        case "$file" in
          crates/sui-framework/* | external-crates/move/documentation/* | external-crates/move/crates/move-stdlib/*)
            is_non_framework_markdown_only=false
            break
            ;;
          *.md)
            ;;
          *)
            is_non_framework_markdown_only=false
            break
            ;;
        esac
      done

      echo "isNonFrameworkMarkdownOnly=$is_non_framework_markdown_only" >> "$GITHUB_OUTPUT"
