name: Setup Rust build environment
description: >
  Single source of truth for the Rust CI/release build environment.
  On Linux runners: installs upstream mold and configures RUSTFLAGS to use it.
  On any runner: configures sccache with S3 backend (graceful degradation if
  AWS credentials are empty, e.g. fork PRs).

inputs:
  aws-access-key-id:
    description: AWS access key ID for S3 cache backend (empty for fork PRs)
    required: false
  aws-secret-access-key:
    description: AWS secret access key for S3 cache backend (empty for fork PRs)
    required: false
  key-prefix:
    description: S3 key prefix for cache partitioning (e.g., ubuntu-ghcloud, windows-ghcloud)
    required: true

runs:
  using: composite
  steps:
    # ---- Linux: install upstream mold linker ----
    #
    # Why upstream, not apt? Ubuntu 22.04 apt ships mold 1.0.3 (Oct 2022) which
    # has known unsoundness bugs that cause SIGSEGV in large Rust workspaces
    # (reproduced against Sui's test suite in Docker). Ubuntu 24.04 apt ships
    # mold 2.30. Either way, pinning to a specific upstream binary gives us
    # distro-independent, version-deterministic linking.
    #
    # Static binary: works on any glibc >= 2.17.
    - name: Install mold linker (Linux)
      if: runner.os == 'Linux'
      shell: bash
      env:
        MOLD_VERSION: '2.40.4'
        SHA256_X86_64: '4c999e19ffa31afa5aa429c679b665d5e2ca5a6b6832ad4b79668e8dcf3d8ec1'
        SHA256_AARCH64: 'c799b9ccae8728793da2186718fbe53b76400a9da396184fac0c64aa3298ec37'
      run: |
        set -euo pipefail
        arch=$(uname -m)
        case "$arch" in
          x86_64)   mold_arch='x86_64-linux';   expected_sha="$SHA256_X86_64" ;;
          aarch64)  mold_arch='aarch64-linux';  expected_sha="$SHA256_AARCH64" ;;
          *)        echo "unsupported arch: $arch"; exit 1 ;;
        esac
        url="https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-${mold_arch}.tar.gz"
        tmp="$(mktemp -d)"
        for attempt in 1 2 3; do
          if curl -fsSL --retry 3 --retry-delay 2 -o "$tmp/mold.tar.gz" "$url"; then break; fi
          echo "mold download attempt $attempt failed"; sleep 5
          [ "$attempt" = 3 ] && exit 1
        done
        echo "${expected_sha}  ${tmp}/mold.tar.gz" | sha256sum -c -
        sudo tar xz -C /opt -f "$tmp/mold.tar.gz"
        sudo ln -sf "/opt/mold-${MOLD_VERSION}-${mold_arch}/bin/mold" /usr/local/bin/mold
        sudo ln -sf "/opt/mold-${MOLD_VERSION}-${mold_arch}/bin/mold" /usr/local/bin/ld.mold
        mold --version

    # ---- Linux: configure RUSTFLAGS to use mold ----
    #
    # RUSTFLAGS env fully replaces [build].rustflags from .cargo/config.toml,
    # so the baseline flags from that file are replicated here alongside the
    # -C link-arg=-fuse-ld=mold flag. Keep in sync with .cargo/config.toml:
    # any future change to [build].rustflags in that file must also be
    # reflected in the value below.
    - name: Configure RUSTFLAGS for mold (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        echo "RUSTFLAGS=-C force-frame-pointers=yes -C force-unwind-tables=yes -A unknown_lints -A mismatched_lifetime_syntaxes -C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"

    # ---- Configure AWS credentials (any OS) ----
    - name: Configure AWS credentials
      if: inputs.aws-access-key-id != ''
      uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # pin@v5.1.1
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: us-west-2

    - name: Set sccache environment
      if: inputs.aws-access-key-id != ''
      shell: bash
      run: |
        echo "SCCACHE_BUCKET=mystenlabs-sccache" >> "$GITHUB_ENV"
        echo "SCCACHE_REGION=us-west-2" >> "$GITHUB_ENV"
        echo "SCCACHE_S3_KEY_PREFIX=${{ inputs.key-prefix }}" >> "$GITHUB_ENV"

    - uses: mozilla-actions/sccache-action@7d986dd989559c6ecdb630a3fd2557667be217ad # pin@v0.0.9
      if: inputs.aws-access-key-id != ''
      id: sccache
      continue-on-error: true

    - name: Enable sccache
      if: steps.sccache.outcome == 'success'
      shell: bash
      run: echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
