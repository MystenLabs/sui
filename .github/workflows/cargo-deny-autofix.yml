name: Cargo Deny Advisories Autofix

on:
  schedule:
    # Daily, before the US workday, so advisory fixes land before they start
    # failing PR CI for everyone.
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: cargo-deny-autofix
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  autofix:
    name: Fix cargo-deny advisories
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Check for an existing autofix PR
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open_pr=$(gh pr list --state open \
            --search '"Fix cargo-deny advisories" in:title' \
            --json number --jq '.[0].number // empty')
          if [[ -n "$open_pr" ]]; then
            echo "::notice::Autofix PR #${open_pr} is already open; skipping."
          fi
          echo "open_pr=$open_pr" >> "$GITHUB_OUTPUT"

      - uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # pin@v2.82.10
        if: steps.existing.outputs.open_pr == ''
        with:
          tool: cargo-deny

      - name: Detect and fix advisories
        if: steps.existing.outputs.open_pr == ''
        id: fix
        run: ./scripts/cargo-deny-autofix.sh

      # Only open a PR when the bumps fully resolve the advisories: in a mixed
      # run the PR's own cargo-deny CI job would still fail, so the whole run
      # is reported on the manual-attention issue instead.
      - name: Generate app token
        if: steps.fix.outputs.has_fixes == 'true' && steps.fix.outputs.has_remaining != 'true'
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # pin@v2.2.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create fix PR
        if: steps.fix.outputs.has_fixes == 'true' && steps.fix.outputs.has_remaining != 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          OUT_DIR: ${{ steps.fix.outputs.out_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          STAMP="$(date +%Y%m%d%H%M%S)"
          BRANCH="autofix/cargo-deny-advisories-${STAMP}"
          TITLE="Fix cargo-deny advisories"

          git checkout -b "$BRANCH"
          git add -- Cargo.lock external-crates/move/Cargo.lock examples/rust/*/Cargo.lock
          git commit -m "$TITLE"
          # Push using the app token URL so the push is attributed to the GitHub
          # App, not github-actions[bot]. Pushes with GITHUB_TOKEN don't trigger
          # CI workflows.
          git push -u \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$BRANCH"

          {
            echo "## Description"
            echo
            echo "Automated semver-compatible lockfile bumps for \`cargo deny check advisories\` failures, generated by the \`cargo-deny-autofix\` workflow:"
            echo
            cat "$OUT_DIR/fixed.md"
            echo
            echo "## Test plan"
            echo
            echo "\`cargo deny check advisories\` passes for the CI-gated workspaces (root and \`external-crates/move\`) after the bumps; verified by the workflow before opening this PR."
          } > /tmp/pr-body.md

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --reviewer "ebmifa,amnn,lxfind,bmwill,mwtian,mystenmark,stefan-mysten" \
            --body-file /tmp/pr-body.md

      - name: Report advisories that need manual attention
        if: steps.fix.outputs.has_remaining == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OUT_DIR: ${{ steps.fix.outputs.out_dir }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="cargo-deny advisories require manual attention"

          {
            echo "The \`cargo-deny-autofix\` workflow could not fix the following advisories with a semver-compatible lockfile bump. They need a manual dependency upgrade or a \`deny.toml\` ignore entry:"
            echo
            cat "$OUT_DIR/remaining.md"
            if [[ -s "$OUT_DIR/fixed.md" ]]; then
              echo
              echo "Semver-compatible bumps were found for the advisories below, but no PR was opened because \`cargo deny check advisories\` would still fail. Run \`scripts/cargo-deny-autofix.sh\` locally to reproduce them as a starting point:"
              echo
              cat "$OUT_DIR/fixed.md"
            fi
            echo
            echo "Workflow run: $RUN_URL"
          } > /tmp/issue-body.md

          issue=$(gh issue list --state open \
            --search "\"$TITLE\" in:title" \
            --json number --jq '.[0].number // empty')
          if [[ -n "$issue" ]]; then
            gh issue comment "$issue" --body-file /tmp/issue-body.md
          else
            gh issue create --title "$TITLE" --body-file /tmp/issue-body.md
          fi

          echo "::error::Advisories remain that could not be auto-fixed; see the issue for details."
          exit 1
