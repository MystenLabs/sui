name: Docs Frontmatter Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/content/**/*.mdx'

permissions:
  contents: read

jobs:
  check-frontmatter:
    name: Check docs frontmatter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed MDX files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD -- 'docs/content/**/*.mdx' | grep -v 'snippets/' | grep -v 'sui-graphql/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            COUNT=0
          else
            COUNT=$(echo "$FILES" | grep -c '.mdx$' || true)
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Check frontmatter
        if: steps.changed.outputs.count != '0'
        id: check
        run: |
          MISSING_GOAL=""
          MISSING_FM=""
          MISSING_GEO=""
          TOTAL=0
          ISSUES=0
          GEO_ISSUES=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            TOTAL=$((TOTAL + 1))

            # Extract full frontmatter block between --- markers
            FM=$(awk '/^---$/{n++; next} n==1{print} n>=2{exit}' "$file")

            # Check for title
            if ! echo "$FM" | grep -q '^title:'; then
              MISSING_FM="$MISSING_FM\n- \`$file\`: missing \`title\`"
              ISSUES=$((ISSUES + 1))
            fi

            # Check for description
            if ! echo "$FM" | grep -q '^description:'; then
              MISSING_FM="$MISSING_FM\n- \`$file\`: missing \`description\`"
              ISSUES=$((ISSUES + 1))
            fi

            # Check for keywords
            if ! echo "$FM" | grep -q '^keywords:'; then
              MISSING_FM="$MISSING_FM\n- \`$file\`: missing \`keywords\`"
              ISSUES=$((ISSUES + 1))
            fi

            # Check for goal
            if ! echo "$FM" | grep -q '^goal:'; then
              MISSING_GOAL="$MISSING_GOAL\n- \`$file\`"
              ISSUES=$((ISSUES + 1))
            fi

            # Check for GEO/AEO fields
            if ! echo "$FM" | grep -q '^questions:'; then
              MISSING_GEO="$MISSING_GEO\n- \`$file\`: missing \`questions\`"
              GEO_ISSUES=$((GEO_ISSUES + 1))
            fi
            if ! echo "$FM" | grep -q '^answer:'; then
              MISSING_GEO="$MISSING_GEO\n- \`$file\`: missing \`answer\`"
              GEO_ISSUES=$((GEO_ISSUES + 1))
            fi

          done <<< "${{ steps.changed.outputs.files }}"

          # Build output
          BODY=""

          if [ -n "$MISSING_FM" ]; then
            BODY="${BODY}### Missing required frontmatter\n\nThese pages are missing \`title\`, \`description\`, or \`keywords\`:\n${MISSING_FM}\n\n"
          fi

          if [ -n "$MISSING_GOAL" ]; then
            BODY="${BODY}### Missing goal frontmatter\n\nThese pages don't have a \`goal:\` block. Run this to auto-generate:\n\n\`\`\`sh\ncd docs/site && node scripts/generate-goals.mjs --apply\n\`\`\`\n\nThen review the generated goals and adjust if needed.\n\nPages:\n${MISSING_GOAL}\n\n"
          fi

          if [ -n "$MISSING_GEO" ]; then
            BODY="${BODY}### Missing GEO/AEO frontmatter\n\nThese pages are missing \`questions\` or \`answer\` fields for AI search visibility. Run this to auto-generate:\n\n\`\`\`sh\ncd docs/site && node scripts/generate-geo.mjs --apply\n\`\`\`\n\nPages:\n${MISSING_GEO}\n\n"
          fi

          ALL_ISSUES=$((ISSUES + GEO_ISSUES))
          if [ -z "$BODY" ]; then
            BODY="All ${TOTAL} changed docs pages have complete frontmatter. :white_check_mark:"
          fi

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Write job summary
        if: steps.changed.outputs.count != '0'
        run: |
          echo "## Docs frontmatter check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo -e "$BODY" >> $GITHUB_STEP_SUMMARY
        env:
          BODY: ${{ steps.check.outputs.body }}
