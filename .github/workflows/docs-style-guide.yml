name: Docs Style Guide Check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'docs/content/**/*.mdx'
      - 'docs/content/**/*.md'

permissions:
  contents: read

jobs:
  style-check:
    name: Style guide compliance
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed docs files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'docs/content/**/*.mdx' 'docs/content/**/*.md' | head -50)
          if [ -z "$FILES" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            # Write files to a temp file for the next step
            echo "$FILES" > /tmp/changed_docs.txt
            echo "count=$(echo "$FILES" | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.changed.outputs.count != '0'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run style guide checks and suggest fixes
        if: steps.changed.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const files = fs.readFileSync('/tmp/changed_docs.txt', 'utf8').trim().split('\n').filter(Boolean);
            const comments = [];

            // Get the diff to know which lines are part of this PR
            const diff = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 300,
            });
            const diffFiles = new Map();
            for (const f of diff.data) {
              if (f.patch) {
                // Parse patch to find added line numbers
                const addedLines = new Set();
                let lineNum = 0;
                for (const line of f.patch.split('\n')) {
                  const hunkMatch = line.match(/^@@ -\d+(?:,\d+)? \+(\d+)/);
                  if (hunkMatch) {
                    lineNum = parseInt(hunkMatch[1]) - 1;
                    continue;
                  }
                  if (line.startsWith('-')) continue;
                  lineNum++;
                  if (line.startsWith('+')) {
                    addedLines.add(lineNum);
                  }
                }
                diffFiles.set(f.filename, addedLines);
              }
            }

            function isInCodeBlock(lines, lineIndex) {
              let inCode = false;
              for (let i = 0; i < lineIndex; i++) {
                if (lines[i].match(/^```/)) inCode = !inCode;
              }
              return inCode;
            }

            function hasInlineCodeOnly(line, match) {
              // Check if the match is inside backticks
              const idx = line.indexOf(match);
              if (idx === -1) return false;
              let backtickCount = 0;
              for (let i = 0; i < idx; i++) {
                if (line[i] === '`') backtickCount++;
              }
              return backtickCount % 2 === 1;
            }

            function suggest(file, line, lineNum, original, replacement, rule) {
              const addedLines = diffFiles.get(file);
              if (!addedLines || !addedLines.has(lineNum)) return;

              const newLine = line.replace(original, replacement);
              if (newLine === line) return;

              comments.push({
                path: file,
                line: lineNum,
                side: 'RIGHT',
                body: `**Style guide:** ${rule}\n\n\`\`\`suggestion\n${newLine}\n\`\`\``,
              });
            }

            for (const file of files) {
              if (!fs.existsSync(file)) continue;
              const content = fs.readFileSync(file, 'utf8');
              const lines = content.split('\n');

              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const lineNum = i + 1;

                if (isInCodeBlock(lines, i)) continue;

                // Skip lines that are pure inline code or HTML
                if (line.match(/^\s*</) && !line.match(/^\s*#{2,}/)) continue;

                // === LATIN ABBREVIATIONS ===
                for (const [pattern, replacement, label] of [
                  [/\be\.g\.,?\s*/g, 'for example, ', 'Use "for example" instead of "e.g."'],
                  [/\bi\.e\.,?\s*/g, 'that is, ', 'Use "that is" instead of "i.e."'],
                  [/\betc\.\s*/g, 'and so on. ', 'Use "and so on" instead of "etc."'],
                ]) {
                  if (pattern.test(line) && !hasInlineCodeOnly(line, line.match(pattern)?.[0])) {
                    suggest(file, line, lineNum, pattern, replacement, label);
                  }
                }

                // === WORD PREFERENCES ===
                // "via" → "through"
                if (/\bvia\b/i.test(line) && !hasInlineCodeOnly(line, 'via')) {
                  suggest(file, line, lineNum, /\bvia\b/gi, 'through', 'Use "through" instead of "via"');
                }

                // "simple" → "basic"
                if (/\bsimple\b/i.test(line) && !hasInlineCodeOnly(line, 'simple')) {
                  suggest(file, line, lineNum, /\bsimple\b/gi, 'basic', 'Use "basic" instead of "simple"');
                }

                // "simply" → remove or rewrite
                if (/\bsimply\b/i.test(line) && !hasInlineCodeOnly(line, 'simply')) {
                  suggest(file, line, lineNum, /\bsimply\s*/gi, '', 'Remove "simply"');
                }

                // "dApp" → "app"
                if (/\bdApp\b/.test(line) && !hasInlineCodeOnly(line, 'dApp')) {
                  suggest(file, line, lineNum, /\bdApp\b/g, 'app', 'Use "app" instead of "dApp"');
                }
                if (/\bdApps\b/.test(line) && !hasInlineCodeOnly(line, 'dApps')) {
                  suggest(file, line, lineNum, /\bdApps\b/g, 'apps', 'Use "apps" instead of "dApps"');
                }

                // "may" → "might"
                if (/\bmay\b/.test(line) && !hasInlineCodeOnly(line, 'may') && !line.match(/^\s*#/)) {
                  suggest(file, line, lineNum, /\bmay\b/g, 'might', 'Use "might" instead of "may"');
                }

                // === AMPERSANDS ===
                if (/ & /.test(line) && !line.includes('&amp;') && !line.includes('&lt;')) {
                  suggest(file, line, lineNum, / & /g, ' and ', 'Use "and" instead of "&"');
                }

                // === EM DASHES ===
                if (line.includes('—') && !hasInlineCodeOnly(line, '—')) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** No em dashes. Rewrite using commas, parentheses, or split into separate sentences.',
                    });
                  }
                }

                // === EXCLAMATION MARKS ===
                if (/[^`]![^\[\]`]/.test(line) && !line.includes('Hello, World!') && !line.match(/^\s*[!<]/)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** No exclamation marks. Replace with a period.',
                    });
                  }
                }

                // === LOWERCASE NETWORK NAMES ===
                for (const [lower, upper] of [['mainnet', 'Mainnet'], ['testnet', 'Testnet'], ['devnet', 'Devnet'], ['localnet', 'Localnet']]) {
                  const re = new RegExp(`\\b${lower}\\b`, 'g');
                  if (re.test(line) && !hasInlineCodeOnly(line, lower)) {
                    suggest(file, line, lineNum, re, upper, `Capitalize "${lower}" → "${upper}"`);
                  }
                }

                // === "NOTE THAT" / "PLEASE NOTE" ===
                if (/^(?:\s*)(?:Note that|Please note)/i.test(line)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Do not start sentences with "Note that" or "Please note". Remove or rewrite.',
                    });
                  }
                }

                // === ITALIC TEXT ===
                if (/(?<!\*)\*[^*\n]+\*(?!\*)/.test(line) && !line.match(/^\s*[-*]\s/) && !/\*\*/.test(line.replace(/\*[^*]+\*/g, ''))) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** No italic text. Remove `*...*` markers.',
                    });
                  }
                }

                // === SECTION HEADINGS: SENTENCE CASE ===
                const headingMatch = line.match(/^(#{2,5})\s+(.+)/);
                if (headingMatch) {
                  const prefix = headingMatch[1];
                  const text = headingMatch[2];
                  // Check for Title Case (multiple capitalized non-proper-noun words)
                  const words = text.replace(/`[^`]+`/g, '').split(/\s+/);
                  const properNouns = new Set([
                    'Sui', 'Move', 'React', 'Vue', 'TypeScript', 'JavaScript', 'GraphQL',
                    'JSON', 'gRPC', 'API', 'SDK', 'CLI', 'BCS', 'ID', 'Mainnet', 'Testnet',
                    'Devnet', 'Localnet', 'DeepBook', 'Kiosk', 'Walrus', 'SUI', 'SSR',
                    'WASM', 'OAuth', 'OpenID', 'Step', 'Sui', 'One-Time', 'Witness',
                  ]);
                  let capitalizedCount = 0;
                  for (let w = 1; w < words.length; w++) {
                    if (words[w].length > 2 && /^[A-Z]/.test(words[w]) && !properNouns.has(words[w])) {
                      capitalizedCount++;
                    }
                  }
                  if (capitalizedCount >= 2) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(lineNum)) {
                      comments.push({
                        path: file,
                        line: lineNum,
                        side: 'RIGHT',
                        body: '**Style guide:** Section headings should use sentence case (capitalize only the first word and proper nouns).',
                      });
                    }
                  }
                }

                // === STACKED HEADINGS ===
                if (headingMatch && i + 1 < lines.length) {
                  const nextLine = lines[i + 1];
                  if (/^#{2,5}\s+/.test(nextLine)) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(lineNum)) {
                      comments.push({
                        path: file,
                        line: lineNum,
                        side: 'RIGHT',
                        body: '**Style guide:** Never stack headings without body text between them.',
                      });
                    }
                  }
                }

                // === FIRST PERSON ===
                if (/\b(we |we'|our |let's |let us )/i.test(line) && !hasInlineCodeOnly(line, 'we') && !line.match(/^\s*#/)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Use second person ("you") instead of first person ("we", "our", "let\'s").',
                    });
                  }
                }

                // === FUTURE TENSE ===
                if (/\bwill\b/.test(line) && !hasInlineCodeOnly(line, 'will') && !line.match(/^\s*#/) && !line.match(/free\s*will/i)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Use present tense instead of future tense ("will"). For example: "the function returns" instead of "the function will return".',
                    });
                  }
                }

                // === SLASHES FOR AND/OR ===
                if (/\w+\/\w+/.test(line) && !hasInlineCodeOnly(line, '/') && !line.match(/^\s*[-*]/) && !line.match(/https?:\/\//) && !line.match(/^\s*</)) {
                  // Only flag common prose slashes, not file paths or URLs
                  const slashMatch = line.match(/(\w+)\/(\w+)/);
                  if (slashMatch) {
                    const [full, a, b] = slashMatch;
                    // Skip file paths and code-like patterns
                    if (!full.includes('.') && a.length > 1 && b.length > 1 && !/^[A-Z]/.test(a)) {
                      const addedLines = diffFiles.get(file);
                      if (addedLines && addedLines.has(lineNum)) {
                        comments.push({
                          path: file,
                          line: lineNum,
                          side: 'RIGHT',
                          body: `**Style guide:** No slashes for "and"/"or" in prose. Write "${a} or ${b}" or "${a} and ${b}" instead of "${full}".`,
                        });
                      }
                    }
                  }
                }

                // === BRITISH SPELLINGS ===
                for (const [british, american] of [
                  ['behaviour', 'behavior'], ['colour', 'color'], ['favour', 'favor'],
                  ['honour', 'honor'], ['analyse', 'analyze'], ['organise', 'organize'],
                  ['initialise', 'initialize'], ['serialise', 'serialize'],
                  ['customise', 'customize'], ['recognise', 'recognize'],
                  ['factorisation', 'factorization'], ['utilise', 'utilize'],
                ]) {
                  const re = new RegExp(`\\b${british}\\b`, 'gi');
                  if (re.test(line) && !hasInlineCodeOnly(line, british)) {
                    suggest(file, line, lineNum, re, american, `US English: "${british}" → "${american}"`);
                  }
                }

                // === QUOTATION MARKS AROUND TERMS ===
                const quoteMatch = line.match(/"([^"]+)"/);
                if (quoteMatch && !line.includes('Hello, World!') && !line.match(/^\s*</) && !hasInlineCodeOnly(line, quoteMatch[0])) {
                  const term = quoteMatch[1];
                  if (term.length < 40 && !term.includes('http') && !term.includes(':')) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(lineNum)) {
                      comments.push({
                        path: file,
                        line: lineNum,
                        side: 'RIGHT',
                        body: `**Style guide:** No quotation marks around terms. Remove quotes or use backticks for code identifiers.`,
                      });
                    }
                  }
                }

                // === BULLETED LIST: TERM LISTS (bold term, colon, definition) ===
                // Flag: `- **Term** - definition` should be `- **Term:** definition`
                const termDashMatch = line.match(/^(\s*[-*]\s+\*\*[^*]+\*\*)\s+-\s+/);
                if (termDashMatch) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    const fixed = line.replace(/^(\s*[-*]\s+\*\*[^*]+)\*\*\s+-\s+/, '$1:**\n');
                    // Can't do clean suggestion for this, use comment
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Term lists use colon, not dash. Format: `- **Term:** Definition`',
                    });
                  }
                }

                // === BULLETED LIST: ATTRIBUTE LISTS (code term, colon, description) ===
                // Flag: `- \`attr\` - description` should be `- \`attr\`: description`
                const attrDashMatch = line.match(/^(\s*[-*]\s+`[^`]+`)\s+-\s+/);
                if (attrDashMatch) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Attribute lists use colon, not dash. Format: ``- `attr`: Description``',
                    });
                  }
                }

                // === BULLETED LIST: MIXED PERIODS ===
                // Track per-list whether items are sentences or fragments (checked at file level below)

                // === INLINE CODE: function/method names in prose without backticks ===
                // Catch camelCase identifiers not in backticks (likely function/method names)
                if (!line.match(/^\s*#/) && !isInCodeBlock(lines, i)) {
                  const camelMatch = line.match(/(?<![`\w])([a-z][a-zA-Z]*[A-Z][a-zA-Z]*(?:\(\))?)(?![`\w])/);
                  if (camelMatch && !hasInlineCodeOnly(line, camelMatch[1])) {
                    const term = camelMatch[1];
                    // Skip common non-code words
                    const skipWords = new Set(['JavaScript', 'TypeScript', 'GitHub', 'iPhone', 'macOS', 'zkLogin', 'DeepBook', 'DeepBookV3', 'SuiJSON', 'SuiLink', 'SuiPlay']);
                    if (!skipWords.has(term)) {
                      const addedLines = diffFiles.get(file);
                      if (addedLines && addedLines.has(lineNum)) {
                        comments.push({
                          path: file,
                          line: lineNum,
                          side: 'RIGHT',
                          body: `**Style guide:** Code identifiers should use inline code. Wrap \`${term}\` in backticks.`,
                        });
                      }
                    }
                  }
                }

                // === HEADING: PERIOD AT END ===
                if (headingMatch) {
                  const headingText = headingMatch[2].trim();
                  if (headingText.endsWith('.')) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(lineNum)) {
                      comments.push({
                        path: file,
                        line: lineNum,
                        side: 'RIGHT',
                        body: '**Style guide:** No periods after headings.',
                      });
                    }
                  }
                }

                // === H1 IN BODY (should only be in frontmatter title) ===
                if (/^#\s+/.test(line) && !/^##/.test(line)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** H1 (`#`) is for the page title only (set in frontmatter). Use `##` or lower for section headings.',
                    });
                  }
                }

                // === NEVER HYPHENATED terms ===
                for (const [wrong, right] of [
                  ['key-pair', 'key pair'], ['layer-1', 'layer 1'],
                  ['open-source', 'open source'], ['use-case', 'use case'],
                ]) {
                  const re = new RegExp(`\\b${wrong.replace('-', '-')}\\b`, 'gi');
                  if (re.test(line) && !hasInlineCodeOnly(line, wrong)) {
                    suggest(file, line, lineNum, re, right, `"${wrong}" should not be hyphenated → "${right}"`);
                  }
                }

                // === ALWAYS HYPHENATED terms ===
                for (const [wrong, right] of [
                  ['peer to peer', 'peer-to-peer'], ['proof of stake', 'proof-of-stake'],
                  ['single writer', 'single-writer'], ['multi writer', 'multi-writer'],
                  ['depth first', 'depth-first'],
                ]) {
                  const re = new RegExp(`\\b${wrong}\\b`, 'gi');
                  if (re.test(line) && !hasInlineCodeOnly(line, wrong)) {
                    suggest(file, line, lineNum, re, right, `"${wrong}" should be hyphenated → "${right}"`);
                  }
                }

                // === COMPOUND WORDS (not hyphenated, single words) ===
                for (const [wrong, right] of [
                  ['off-chain', 'offchain'], ['on-chain', 'onchain'],
                  ['off-device', 'offdevice'], ['on-device', 'ondevice'],
                  ['off chain', 'offchain'], ['on chain', 'onchain'],
                  ['off device', 'offdevice'], ['on device', 'ondevice'],
                ]) {
                  const re = new RegExp(`\\b${wrong}\\b`, 'gi');
                  if (re.test(line) && !hasInlineCodeOnly(line, wrong)) {
                    suggest(file, line, lineNum, re, right, `"${wrong}" is one word → "${right}"`);
                  }
                }

                // === ABBREVIATIONS (write out full words) ===
                for (const [abbrev, full] of [
                  ['\\binfo\\b', 'information'],
                ]) {
                  const re = new RegExp(abbrev, 'gi');
                  if (re.test(line) && !hasInlineCodeOnly(line, 'info') && !line.match(/^\s*#/) && !line.match(/:::info/)) {
                    suggest(file, line, lineNum, re, full, `Do not abbreviate: write "${full}" instead of "info"`);
                  }
                }

                // === "since" (causal) → "because" ===
                // Only flag when "since" starts a sentence or clause (after comma/period)
                if (/(?:^|\.\s+|,\s+)[Ss]ince\s+/m.test(line) && !hasInlineCodeOnly(line, 'since')) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Use "because" instead of causal "since" (reserve "since" for time references only).',
                    });
                  }
                }

                // === PASSIVE VOICE indicators ===
                if (/\b(is|are|was|were|be|been|being)\s+(being\s+)?(recommended|required|needed|expected|considered|used|called|known|defined|designed)\b/i.test(line) && !isInCodeBlock(lines, i)) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Use active voice. For example: "Use X" instead of "X is recommended", "You need X" instead of "X is required".',
                    });
                  }
                }

                // === TOO MANY ADMONITIONS (checked at file level below) ===

                // === BARE URL as link text ===
                const bareUrlLink = line.match(/\[(https?:\/\/[^\]]+)\]\(/);
                if (bareUrlLink) {
                  const addedLines = diffFiles.get(file);
                  if (addedLines && addedLines.has(lineNum)) {
                    comments.push({
                      path: file,
                      line: lineNum,
                      side: 'RIGHT',
                      body: '**Style guide:** Never use a bare URL as link text. Use the target page title or a descriptive phrase.',
                    });
                  }
                }

                // === ALL CAPS for emphasis ===
                const capsMatch = line.match(/\b([A-Z]{4,})\b/);
                if (capsMatch && !isInCodeBlock(lines, i) && !hasInlineCodeOnly(line, capsMatch[1])) {
                  const word = capsMatch[1];
                  // Skip known acronyms and constants
                  const validCaps = new Set(['JSON', 'HTML', 'HTTP', 'HTTPS', 'API', 'SDK', 'CLI', 'RPC', 'WASM', 'MIST', 'SUI', 'BCS', 'TOML', 'YAML', 'GRPC', 'REST', 'CORS', 'TRUE', 'FALSE', 'NULL', 'NOTE', 'INFO', 'TODO', 'SPDX', 'UTF', 'EOF', 'ENV']);
                  if (!validCaps.has(word) && !word.match(/^[A-Z_]+$/) && !line.match(/^\s*#/)) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(lineNum)) {
                      comments.push({
                        path: file,
                        line: lineNum,
                        side: 'RIGHT',
                        body: `**Style guide:** Do not use ALL CAPS for emphasis. Use **bold** instead.`,
                      });
                    }
                  }
                }
              }

              // === FILE-LEVEL: ADMONITION COUNT (max 4 per page) ===
              const admonitionCount = (content.match(/^:::(caution|danger|info|note|tip)/gm) || []).length;
              if (admonitionCount > 4) {
                comments.push({
                  path: file,
                  line: 1,
                  side: 'RIGHT',
                  body: `**Style guide:** Maximum 4 admonitions per page. This file has ${admonitionCount}. Remove or consolidate.`,
                });
              }

              // === FILE-LEVEL: :::note (should use :::tip or :::info instead) ===
              const noteMatches = content.match(/^:::note/gm);
              if (noteMatches) {
                // Find the first occurrence line number
                for (let i = 0; i < lines.length; i++) {
                  if (lines[i].trim() === ':::note') {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(i + 1)) {
                      comments.push({
                        path: file,
                        line: i + 1,
                        side: 'RIGHT',
                        body: '**Style guide:** Avoid `:::note`. Use `:::tip` or `:::info` instead.',
                      });
                    }
                    break;
                  }
                }
              }

              // === FILE-LEVEL: MIXED LIST PUNCTUATION ===
              // Check bulleted lists: items should all have periods or none
              let currentListHasPeriods = null;
              let listStartLine = 0;
              let mixedPunctuationFlagged = false;
              for (let i = 0; i < lines.length; i++) {
                const listMatch = lines[i].match(/^(\s*[-*]\s+)(.+)/);
                if (listMatch && !isInCodeBlock(lines, i)) {
                  const text = listMatch[2].trim();
                  if (text.length < 5) continue; // skip short items
                  const hasPeriod = /\.\s*$/.test(text);
                  if (currentListHasPeriods === null) {
                    currentListHasPeriods = hasPeriod;
                    listStartLine = i + 1;
                  } else if (hasPeriod !== currentListHasPeriods && !mixedPunctuationFlagged) {
                    const addedLines = diffFiles.get(file);
                    if (addedLines && addedLines.has(i + 1)) {
                      comments.push({
                        path: file,
                        line: i + 1,
                        side: 'RIGHT',
                        body: '**Style guide:** List items should be consistent: all with periods (full sentences) or all without (fragments). Do not mix.',
                      });
                      mixedPunctuationFlagged = true;
                    }
                  }
                } else if (!/^\s/.test(lines[i]) && lines[i].trim() !== '') {
                  // Reset on non-list non-empty line
                  currentListHasPeriods = null;
                  mixedPunctuationFlagged = false;
                }
              }

              // === FRONTMATTER CHECKS ===
              const fmMatch = content.match(/^---\n([\s\S]*?)\n---/);
              if (fmMatch) {
                const fm = fmMatch[1];
                if (!fm.includes('description:') || fm.match(/description:\s*(placeholder)?\s*$/m)) {
                  comments.push({
                    path: file,
                    line: 1,
                    side: 'RIGHT',
                    body: '**Style guide:** Frontmatter must include a `description` that is a complete sentence.',
                  });
                }
                if (!fm.includes('keywords:') || fm.match(/keywords:\s*\[\s*placeholder\s*\]/)) {
                  comments.push({
                    path: file,
                    line: 1,
                    side: 'RIGHT',
                    body: '**Style guide:** Frontmatter must include `keywords` with relevant terms.',
                  });
                }
              }
            }

            // Dedupe comments (same file + line + body)
            const seen = new Set();
            const uniqueComments = comments.filter(c => {
              const key = `${c.path}:${c.line}:${c.body.slice(0, 80)}`;
              if (seen.has(key)) return false;
              seen.add(key);
              return true;
            });

            if (uniqueComments.length === 0) {
              console.log('No style guide violations found.');
              // Write success to job summary
              await core.summary
                .addHeading('Docs style guide — all clear', 2)
                .addRaw('No violations found in changed docs files.')
                .write();
              return;
            }

            console.log(`Found ${uniqueComments.length} style guide suggestions.`);

            // Write violations to the GitHub Actions job summary (always writable,
            // no special permissions needed). This renders as a rich markdown page
            // in the Actions check details.
            const byFile = new Map();
            for (const c of uniqueComments) {
              if (!byFile.has(c.path)) byFile.set(c.path, []);
              byFile.get(c.path).push(c);
            }

            let summary = core.summary
              .addHeading(`Docs style guide — ${uniqueComments.length} issues found`, 2)
              .addRaw(`Based on the [Sui Documentation Style Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/docs/content/references/contribute/style-guide.mdx)\n\n`);

            for (const [file, fileComments] of byFile) {
              summary.addHeading(file, 3);
              const rows = fileComments.map(c => {
                // Clean up suggestion blocks for table display
                const clean = c.body
                  .replace(/\n\n```suggestion\n([\s\S]*?)```/g, ' → `$1`')
                  .replace(/\n/g, ' ')
                  .trim();
                return [`${c.line}`, clean];
              });
              summary.addTable([
                [{data: 'Line', header: true}, {data: 'Issue', header: true}],
                ...rows,
              ]);
            }

            summary.addRaw('\n\n<details><summary>Quick reference</summary>\n\n');
            summary.addTable([
              [{data: 'Instead of', header: true}, {data: 'Use', header: true}],
              ['e.g., i.e., etc.', '"for example", "that is", "and so on"'],
              ['via', 'through'],
              ['simple/simply', 'basic (or rewrite)'],
              ['dApp', 'app'],
              ['may', 'might'],
              ['since (causal)', 'because'],
              ['& (in prose)', 'and'],
              ['em dash (—)', 'comma, parentheses, or split sentence'],
              ['mainnet/testnet', 'Mainnet/Testnet'],
              ['Note that / Please note', '(remove or rewrite)'],
              ['we/our/let\'s', 'you (second person)'],
              ['will (future)', 'present tense'],
              ['on-chain / off-chain', 'onchain / offchain'],
            ]);
            summary.addRaw('\n</details>\n');

            await summary.write();

            // Fail the check so the PR author sees the violations
            core.setFailed(`Found ${uniqueComments.length} style guide violations. See the job summary for details.`);
