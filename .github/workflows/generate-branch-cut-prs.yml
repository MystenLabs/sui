name: Generate Sui Branch Cut PRs
run-name: Generate Sui Branch Cut PRs

on:
  workflow_dispatch:

concurrency: ${{ github.workflow }}

permissions:
  contents: write
  pull-requests: write

jobs:
  snapshot:
    name: Generate Snapshot PR
    runs-on: ubuntu-ghcloud

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Generate app token
        id: app_token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # pin@v2.2.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          ./scripts/gen_branch_cut_prs.sh snapshot

  version-bump:
    name: Generate Version Bump PR
    uses: ./.github/workflows/version-bump.yml
    with:
      type: minor
      delivery: pr
      auto_merge: false
    secrets: inherit
