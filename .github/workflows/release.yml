name: Attach Sui binaries to a release
run-name: Attach Sui binaries to a ${{ inputs.sui_tag }} release

on:
  release:
    types: created
  workflow_dispatch:
    inputs:
      sui_tag:
        description: 'Sui repo tag to build from'
        type: string
        required: true

concurrency: ${{ github.workflow }}-${{ inputs.sui_tag || github.ref_name }}

env:
  TAG_NAME: "${{ github.event.inputs.sui_tag || github.ref_name }}"
  BINARY_LIST_FILE: "./binary-build-list.json"
  CARGO_TERM_COLOR: always
  # Disable incremental compilation.
  #
  # Incremental compilation is useful as part of an edit-build-test-edit cycle,
  # as it lets the compiler avoid recompiling code that hasn't changed. However,
  # on CI, we're not making small edits; we're almost always building the entire
  # project from scratch. Thus, incremental compilation on CI actually
  # introduces *additional* overhead to support making future builds
  # faster...but no future builds will ever occur in any given CI environment.
  #
  # See https://matklad.github.io/2021/09/04/fast-rust-builds.html#ci-workflow
  # for details.
  CARGO_INCREMENTAL: 0
  # Allow more retries for network requests in cargo (downloading crates) and
  # rustup (installing toolchains). This should help to reduce flaky CI failures
  # from transient network timeouts or other issues.
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # Don't emit giant backtraces in the CI logs.
  RUST_BACKTRACE: short
  TMP_BUILD_DIR: './tmp/release'

jobs:
  release-build:
    name: Build & Publish Binaries
    timeout-minutes: 240
    strategy:
      matrix:
        os:
          [
            ubuntu-ghcloud, # ubuntu-x86_64
            ubuntu-arm64, # ubuntu-arm64
            windows-ghcloud, # windows-x86_64
            macos-latest-large, # macos-x86_64
            macos-latest-xlarge # macos-arm64
          ]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clean up and validate ${{ env.TAG_NAME }} tag name
        shell: bash
        run: |
          export sui_tag=$(echo ${{ env.TAG_NAME }} | sed s/'refs\/tags\/'//)
          # only published release tags may be built: a workflow_dispatch runs
          # with a trusted main OIDC sub while building this input, so an
          # unconstrained ref here would let arbitrary code run under that sub
          if [[ ! "${sui_tag}" =~ ^(devnet|testnet|mainnet)-v ]]; then
            echo "sui_tag must be a release tag (devnet-v*/testnet-v*/mainnet-v*), got: ${sui_tag}"
            exit 1
          fi
          echo "sui_tag=${sui_tag}" >> $GITHUB_ENV
          export sui_version=$(echo ${sui_tag} | sed -e 's/mainnet-v//' -e 's/testnet-v//')
          echo "sui_version=${sui_version}" >> $GITHUB_ENV

      - name: Check out ${{ env.sui_tag }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          # pin to the tag namespace so the input can never resolve to a branch
          ref: refs/tags/${{ env.sui_tag }}          

      - name: Set os/arch variables (Windows)
        if: ${{ matrix.os == 'windows-ghcloud' }}
        shell: bash
        run: |
          export arch=$(uname -m)
          export os_type="windows-${arch}"
          echo "os_type=${os_type}" >> $GITHUB_ENV
          echo "extention=$(echo ".exe")" >> $GITHUB_ENV

      - name: Set os/arch variables
        if: ${{ matrix.os != 'windows-ghcloud' }}
        shell: bash
        run: |
          export arch=$(uname -m)
          export system_os=$(echo ${{ matrix.os }} | cut -d- -f1)
          export os_type="${system_os}-${arch}"
          echo "os_type=${system_os}-${arch}" >> $GITHUB_ENV     

      - name: Check if archive for this version has already been published
        continue-on-error: true
        shell: bash
        run: |
          echo "s3_existing_archive=$(for network in mainnet testnet devnet; do \
            if curl -Is https://sui-releases.s3.us-east-1.amazonaws.com/releases/sui-${network}-v${{ env.sui_version }}-${{ env.os_type }}.tgz \
            | head -n1 | grep -q '200 OK'; then echo "releases/sui-${network}-v${{ env.sui_version }}-${{ env.os_type }}.tgz"; \
            break; fi; done)" >> $GITHUB_ENV

      - name: Download archive, if it exists
        if: ${{ env.s3_existing_archive != '' }}
        shell: bash
        run: |
          mkdir -p ${{ env.TMP_BUILD_DIR }}
          # released archives are publicly readable (the existence check above
          # relies on that), so no AWS credentials are needed here
          curl -fSs -o ./tmp/sui-${{ env.sui_tag }}-${os_type}.tgz https://sui-releases.s3.us-east-1.amazonaws.com/${{ env.s3_existing_archive }}
          tar -xf ./tmp/sui-${{ env.sui_tag }}-${os_type}.tgz -C ${{ env.TMP_BUILD_DIR }}

      - name: Install nexttest (Windows)
        if: ${{ matrix.os == 'windows-ghcloud' && env.s3_existing_archive == '' }}
        uses: taiki-e/install-action@88d897fbe3f79ed72a43e0dcbca36156ff03344e # pin@v2.67.14
        with:
          tool: cargo-hack

      - name: Install postgres (Windows)
        if: ${{ matrix.os == 'windows-ghcloud' && env.s3_existing_archive == '' }}
        shell: bash
        run: |
          choco install postgresql12 --force --params '/Password:root'
          echo "C:\Program Files\PostgreSQL\12\bin" >> $GITHUB_PATH
          echo "C:\Program Files\PostgreSQL\12\lib" >> $GITHUB_PATH
          echo "PQ_LIB_DIR=C:\Program Files\PostgreSQL\12\lib" >> $GITHUB_ENV
          echo "PG_DATABASE_URL=postgres://postgres:root@localhost/" >> $GITHUB_ENV
          echo "PG_EXAMPLE_DATABASE_URL=postgres://postgres:root@localhost/diesel_example" >> $GITHUB_ENV

      - name: Install postgres (MacOS arm64)
        if: ${{ matrix.os == 'macos-latest-xlarge' && env.s3_existing_archive == '' }}
        shell: bash
        env:
          PQ_LIB_DIR: "$(brew --prefix libpq)/lib"
          LIBRARY_PATH: "/opt/homebrew/lib:$LIBRARY_PATH"
          PKG_CONFIG_PATH: "/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          PATH: "/opt/homebrew/bin:$PATH"
        run: |
          brew install postgresql

      - name: Remove unused apps (MacOS arm64)
        if: ${{ matrix.os == 'macos-latest-xlarge' && env.s3_existing_archive == '' }}
        continue-on-error: true
        shell: bash
        run: |
          # MacOS arm64 runner only has 14GB avaialble, which is too small for our builds, so removing unused softwared.
          df -h /
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
          sudo rm -rf ~/Library/Developer/Xcode/iOS\ DeviceSupport/*
          df -h /

      - uses: ./.github/actions/setup-sccache
        if: ${{ env.s3_existing_archive == '' }}
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          key-prefix: ${{ matrix.os }}

      - name: Register cargo problem matcher
        if: ${{ env.s3_existing_archive == '' }}
        run: echo "::add-matcher::.github/matchers/cargo.json"

      - name: Cargo build for ${{ matrix.os }} platform
        if: ${{ env.s3_existing_archive == '' }}
        shell: bash
        run: |
          [ -f ~/.cargo/env ] && source ~/.cargo/env
          # Build only the binaries we actually package (the release_binaries in
          # binary-build-list.json — the same list the rename step below moves),
          # not the whole workspace. `sui` is built separately, once, with the
          # tracing feature: a plain `cargo build --release` compiled `sui` without
          # tracing and the next step overwrote it, wasting a compile+link of `sui`
          # on every platform.
          sui_bins=""
          for b in $(jq -r '.release_binaries[] | select(. != "sui")' "${{ env.BINARY_LIST_FILE }}"); do
            sui_bins="$sui_bins --bin $(echo "$b" | tr -d $'\r')"
          done
          cargo build --release $sui_bins
          cargo build --release --features tracing --bin sui
          cargo build --profile=dev --bin sui --features tracing

      - name: Rename binaries for ${{ matrix.os }}
        if: ${{ env.s3_existing_archive == '' }}
        shell: bash
        run: |
          mkdir -p ${{ env.TMP_BUILD_DIR }}

          [ ! -f ${{ env.BINARY_LIST_FILE }} ] && echo "${{ env.BINARY_LIST_FILE }} cannot be found" && exit 1
          for binary in $(cat ${{ env.BINARY_LIST_FILE }} | jq -r '.release_binaries[]'); do
            export binary=$(echo ${binary} | tr -d $'\r')
            mv ./target/release/${binary}${{ env.extention }} ${{ env.TMP_BUILD_DIR }}/${binary}${{ env.extention }}
          done

          mv ./target/debug/sui${{ env.extention }} ${{ env.TMP_BUILD_DIR }}/sui-debug${{ env.extention }}
          tar -cvzf ./tmp/sui-${{ env.sui_tag }}-${{ env.os_type }}.tgz -C ${{ env.TMP_BUILD_DIR }} .

      - name: Publish Windows sui binary to Chocolatey
        if: ${{ matrix.os == 'windows-ghcloud' && contains(env.sui_tag, 'testnet') }}
        shell: bash
        run: |
          choco install checksum
          export sui_sha=$(checksum -t sha256 ${{ env.TMP_BUILD_DIR }}/sui.exe)
          cd chocolatey

          cat <<EOF >>VERIFICATION.txt
          Sui Binary verification steps
          1. Download https://github.com/MystenLabs/sui/releases/download/${{ env.sui_tag }}/sui-${{ env.sui_tag }}-windows-x86_64.tgz
          2. Extract sui.exe
          3. Verify binary: checksum.exe -t sha256 sui.exe: ${sui_sha}

          File 'LICENSE.txt' is obtained from: https://github.com/MystenLabs/sui/blob/main/LICENSE
          EOF

          choco pack --version ${{ env.sui_version }} configuration=release
          choco apikey --api-key ${{ secrets.CHOCO_API_KEY }} --source https://push.chocolatey.org/
          choco push sui.${{ env.sui_version }}.nupkg --source https://push.chocolatey.org/

      - name: Upload release artifacts for ${{ matrix.os }} platform
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # pin@v6.0.0
        with:
          name: sui-binaries-${{ matrix.os }}
          if-no-files-found: error
          path: |
            ./tmp/sui-${{ env.sui_tag }}-${{ env.os_type }}.tgz

      - name: Attach artifacts to ${{ env.sui_tag }} release in GH
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # pin@v2.5.0
        with:
          tag_name: ${{ env.sui_tag }}
          files: |
            ./tmp/sui-${{ env.sui_tag }}-${{ env.os_type }}.tgz

      - name: Dispatch Walrus Sui testnet tag update
        if: ${{ matrix.os == 'ubuntu-ghcloud' && contains(env.sui_tag, 'testnet') }}
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with:
          repository: MystenLabs/walrus
          token: ${{ secrets.WALRUS_REPO_DISPATCH }}
          event-type: update-walrus-sui-testnet-tag
          client-payload: '{"new_tag": "${{ env.sui_tag }}"}'

  # Copy built archives to s3://sui-releases so future runs skip the rebuild and
  # node operators can pull binaries by tag. Runs in the protected `release`
  # environment to assume the dedicated release-s3 OIDC role, credential-isolated
  # from the build job (see .github/AWS_OIDC_ROLES.md, Role 2). `!cancelled()`
  # preserves the old per-platform best-effort upload: archives from matrix legs
  # that succeeded are uploaded even if another leg failed.
  upload-release-archives-to-s3:
    name: Upload release archives to S3
    needs: release-build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token to assume the release-s3 role
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # pin@v6.0.0
        with:
          pattern: sui-binaries-*
          merge-multiple: true
          path: ./archives

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # pin@v5.1.1
        with:
          role-to-assume: arn:aws:iam::011083325127:role/sui-releases-rw-github
          allowed-account-ids: '011083325127'
          aws-region: us-west-2

      - name: Upload archives to s3://sui-releases
        shell: bash
        run: |
          shopt -s nullglob
          for f in ./archives/*.tgz; do
            aws s3 cp "$f" "s3://sui-releases/releases/$(basename "$f")" || true
          done

  update-homebrew-formula:
    name: Bump sui formula on Homebrew/homebrew-core
    needs: release-build
    # releasing sui cli on testnet releases because it lags `main` less than mainnet, but is more likely to be stable than devnet
    if: ${{ contains( inputs.sui_tag, 'testnet') || contains( github.ref_name, 'testnet') }}
    uses: ./.github/workflows/homebrew-bump.yml
    with:
      sui_tag: ${{ inputs.sui_tag || github.ref_name }}
    secrets:
      HOMEBREW_GH_FORMULA_BUMP: ${{ secrets.HOMEBREW_GH_FORMULA_BUMP }}

  # Tag all sui images with release tag, so that they can be easily found
  tag-docker-hub-images:
    name: Tag sui docker images in DockerHub
    runs-on: ubuntu-latest
    steps:
      - name: Derive cache_family from release tag
        id: cf
        shell: bash
        run: |
          sui_tag="${{ env.TAG_NAME }}"
          sui_version=$(echo "${sui_tag}" | sed -e 's|^refs/tags/||' -e 's/^mainnet-v//' -e 's/^testnet-v//' -e 's/^devnet-v//')
          echo "cache_family=releases/sui-v${sui_version}-release" >> "$GITHUB_OUTPUT"

      - name: Dispatch Tagging of images in DockerHub, in MystenLabs/sui-operations
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with:
          repository: MystenLabs/sui-operations
          token: ${{ secrets.DOCKER_BINARY_BUILDS_DISPATCH }}
          event-type: tag-docker-images
          client-payload: '{"sui_commit": "${{ github.sha }}", "tag": "${{ env.TAG_NAME }}", "cache_family": "${{ steps.cf.outputs.cache_family }}"}'

  # Tag sui binaries in S3 under the release alias so node operators that pull
  # by tag name (e.g. `release: testnet-v1.70.2` in ansible) find them.
  tag-release-binaries-in-s3:
    name: Tag sui binaries in s3
    runs-on: ubuntu-latest
    steps:
      - name: Derive cache_family from release tag
        id: cf
        shell: bash
        run: |
          sui_tag="${{ env.TAG_NAME }}"
          sui_version=$(echo "${sui_tag}" | sed -e 's|^refs/tags/||' -e 's/^mainnet-v//' -e 's/^testnet-v//' -e 's/^devnet-v//')
          echo "cache_family=releases/sui-v${sui_version}-release" >> "$GITHUB_OUTPUT"

      - name: Dispatch ensure-sui-binaries in MystenLabs/sui-operations
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with:
          repository: MystenLabs/sui-operations
          token: ${{ secrets.DOCKER_BINARY_BUILDS_DISPATCH }}
          event-type: ensure-sui-binaries
          client-payload: '{"sui_commit": "${{ github.sha }}", "tag_name": "${{ env.TAG_NAME }}", "cache_family": "${{ steps.cf.outputs.cache_family }}"}'
