name: Rust

# TEMPORARY DEBUGGING WORKFLOW (claude-debug): reproduce the deterministic
# fuzz_dynamic_committee checkpoint-wait timeout from
# https://github.com/MystenLabs/sui/actions/runs/29061189525/job/86293168290
# with full logging. This branch strips every other job on purpose; it is
# never meant to merge.

on:
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]
  workflow_dispatch:
    inputs:
      sui_repo_ref:
        description: "Branch / commit to test"
        type: string
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short
  RUSTDOCFLAGS: -D warnings
  SCCACHE_ROLE: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.sui_repo_ref == '') && (contains(fromJSON('["refs/heads/main","refs/heads/devnet","refs/heads/testnet","refs/heads/mainnet"]'), github.ref) || (startsWith(github.ref, 'refs/heads/releases/sui-') && endsWith(github.ref, '-release'))) && 'arn:aws:iam::011083325127:role/sui-sccache-rw-github' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) && 'arn:aws:iam::011083325127:role/sui-sccache-ro-github' || '' }}

jobs:
  simtest:
    permissions:
      contents: read
      id-token: write # OIDC token to assume the sccache role on trusted refs
    timeout-minutes: 120
    runs-on: [ ubuntu-ghcloud ]
    env:
      MSIM_WATCHDOG_TIMEOUT_MS: 300000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2
        with:
          ref: ${{ github.event.inputs.sui_repo_ref || github.ref }}
      - uses: ./.github/actions/setup-sccache
        with:
          role-to-assume: ${{ env.SCCACHE_ROLE }}
          key-prefix: ubuntu-ghcloud
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@protoc
      - name: Add postgres to PATH
        shell: bash
        run: |
          pg_bin=$(ls -d /usr/lib/postgresql/*/bin 2>/dev/null | head -1)
          [ -n "$pg_bin" ] || { echo "ERROR: no postgres bin dir found under /usr/lib/postgresql"; exit 1; }
          echo "$pg_bin" >> "$GITHUB_PATH"
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@fc79b3f67fa8a838184ce84a674ca12238d2c761 # pin@master
        with:
          swap-size-gb: 256
      - name: host info
        run: |
          nproc
          uname -a
          free -h
      - name: cargo simtest (debug fuzz_dynamic_committee, pinned seed)
        env:
          RUST_LOG: sui=debug,info
        run: |
          MSIM_TEST_SEED=5947745660912475448 scripts/simtest/cargo-simtest simtest --profile ci --cargo-quiet --no-fail-fast --retries 0 --no-capture -E 'test(=fuzz_dynamic_committee)' 2>&1 | tee simtest_debug.log
          status=${PIPESTATUS[0]}
          gzip -f simtest_debug.log
          exit "$status"
      - name: upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simtest-debug-log
          path: simtest_debug.log.gz
          retention-days: 3
