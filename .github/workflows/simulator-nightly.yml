name: Simulator Tests

concurrency:
  group: ${{ github.workflow }}

on:
  schedule:
    - cron: '0 9 * * *' # equivalent to 1am PST
    - cron: '0 21 * * *' # equivalent to 1pm PST
  workflow_dispatch:
    inputs:
      sui_ref:
        description: "Branch / commit to test"
        type: string
        required: true
        default: main
      test_num:
        description: "MSIM_TEST_NUM (test iterations)"
        type: string
        required: false
        default: "30"
      protocol_config_override:
        description: "Protocol config override"
        type: string
        required: false
        default: ""

env:
  SUI_REF: "${{ github.event.inputs.sui_ref || 'main' }}"
  TEST_NUM: "${{ github.event.inputs.test_num || '30' }}"

jobs:
  simtest:
    # Allow running the job for up to 6 hours, maximum for GitHub Actions.
    timeout-minutes: 360
    permissions:
      # The "id-token: write" permission is required or Machine ID will not be
      # able to authenticate with the cluster.
      id-token: write
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Install Teleport
        uses: teleport-actions/setup@a820ebbf1bc1a496efca348ad21042d6e8df73a6 # pin@v1.1.0
        with:
          version: 18.2.0
      - name: Authorize against Teleport
        id: auth
        uses: teleport-actions/auth@d48447391aa28b202c98ae3f3358097025c32511 # pin@v2.0.4
        with:
          # Specify the publically accessible address of your Teleport proxy.
          proxy: mysten.teleport.sh:443
          # Specify the name of the join token for your bot.
          token: sui-simtest-token
          # Specify the length of time that the generated credentials should be
          # valid for. This is optional and defaults to "1h"
          certificate-ttl: 6h
      - name: Show Teleport cert details
        run: tsh -i ${{ steps.auth.outputs.identity-file }} status
        env:
          TELEPORT_IDENTITY_FILE: ${{ env.TELEPORT_IDENTITY_FILE }}
      # Clean tmpfs, old repo, and old simtest logs before starting fresh.
      #
      # Consolidated into a single SSH call: each additional `tsh ssh`
      # spin-up has been hitting an intermittent
      # "cannot relogin in non-interactive session" failure on the
      # *second* (and beyond) call within the same step. One handshake
      # = one chance to flake.
      #
      # The pkill block kills any stale simtest workers from a prior
      # nightly that was cancelled mid-run and nohup'd onto the host —
      # otherwise the survivor's in-flight cargo/test processes race
      # our re-clone, exec test binaries we're about to delete, and
      # corrupt the shared ~/simtest_stdout.log via a leaked fd.
      - name: Environment clean
        run: |
          # The character classes ([ ], [e]) below are deliberate: pkill -f
          # matches against the full command line, which includes our own
          # remote bash's command line — and that command line contains the
          # literal pattern as text. A char class is a regex metasequence
          # that still matches the intended live process (cargo-simtest
          # simtest with a real space, target/simulator/deps/ with a real
          # 'e') but does NOT match the literal text "[ ]" / "[e]" in our
          # own shell, so pkill can no longer SIGKILL its own parent.
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "set -e; \
            echo teleport OK; \
            pkill -9 -f 'scripts/simtest/(simtest-run|seed-search)' || true; \
            pkill -9 -f 'cargo-simtest[ ]simtest' || true; \
            pkill -9 -f 'target/simulator/d[e]ps/' || true; \
            sleep 3; \
            sudo rm -rf /tmp/* 2>/dev/null || true; \
            rm -rf ~/sui; \
            cd ~/ && git clone git@github.com:MystenLabs/sui.git; \
            (cd ~/simtest_logs && ls -dt */ 2>/dev/null | tail -n +11 | xargs -r rm -rf) || true"

      # Checkout out the latest sui repo
      - name: Checkout sui repo
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "source ~/.bashrc && source ~/.cargo/env && cd ~/sui && git fetch origin && git checkout ${{ env.SUI_REF }}"

      # Setting up cargo and simtest
      - name: Install simtest
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "source ~/.bashrc && source ~/.cargo/env && cd ~/sui && ./scripts/simtest/install.sh"

      - name: Set protocol config override based on trigger
        id: protocol
        # This step determines which protocol config override to use.
        # It checks if the trigger was a manual dispatch or a specific schedule.
        run: |
          message=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ github.event.inputs.protocol_config_override }}" ]]; then
              echo "Testing with protocol config override: ${{ github.event.inputs.protocol_config_override }}"
              echo "SUI_PROTOCOL_CONFIG_CHAIN_OVERRIDE=${{ github.event.inputs.protocol_config_override }}" >> $GITHUB_ENV
            else
              echo "Testing latest protocol config for dispatched run"
            fi
          elif [[ "${{ github.event.schedule }}" == "0 21 * * *" ]]; then
            echo "Testing mainnet protocol config"
            echo "SUI_PROTOCOL_CONFIG_CHAIN_OVERRIDE=mainnet" >> $GITHUB_ENV
            message="(mainnet config) "
          else
            echo "Testing latest protocol config"
          fi
          # Set the output for other jobs to use
          echo "protocol_message=${message}" >> $GITHUB_OUTPUT

      # Run simulator tests via detached execution to survive SSH session drops.
      # The test script runs independently on the remote machine; we poll for completion
      # with short-lived SSH calls instead of holding a single long-lived session.
      - name: Start simtest (detached)
        run: |
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "rm -f ~/simtest_exit_code"
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "source ~/.bashrc && source ~/.cargo/env && cd ~/sui && nohup bash -c 'RUSTUP_MAX_RETRIES=10 CARGO_TERM_COLOR=always CARGO_INCREMENTAL=0 CARGO_NET_RETRY=10 RUST_BACKTRACE=short RUST_LOG=off NUM_CPUS=24 TEST_NUM=${{ env.TEST_NUM }} ./scripts/simtest/simtest-run.sh > ~/simtest_stdout.log 2>&1; echo \$? > ~/simtest_exit_code' &"

      - name: Wait for simtest completion
        run: |
          ssh_failures=0
          max_ssh_failures=3
          while true; do
            sleep 120
            # Use echo-based check so we can distinguish "SSH failed" from "file not found".
            # If SSH succeeds, we get DONE or RUNNING. If SSH fails, output is empty.
            result=$(tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 \
              "if test -f ~/simtest_exit_code; then echo DONE; else echo RUNNING; fi" 2>/dev/null) || true
            if [ "$result" = "DONE" ]; then
              echo "Simtest completed."
              break
            elif [ "$result" = "RUNNING" ]; then
              ssh_failures=0
              echo "$(date): simtest still running..."
              tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "tail -5 ~/simtest_stdout.log" 2>/dev/null || true
            else
              # No output — SSH call itself failed
              ssh_failures=$((ssh_failures + 1))
              echo "$(date): SSH connection failed (attempt $ssh_failures/$max_ssh_failures)"
              if [ $ssh_failures -ge $max_ssh_failures ]; then
                echo "Too many consecutive SSH failures. The test may still be running on the remote machine."
                exit 1
              fi
            fi
          done

      - name: Check simtest results
        run: |
          exit_code=$(tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "cat ~/simtest_exit_code")
          echo "Remote simtest exited with code: $exit_code"
          echo "--- Last 200 lines of simtest output ---"
          tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "tail -200 ~/simtest_stdout.log" || true
          exit "$exit_code"

      - name: Collect failing tests
        id: failures
        if: failure()
        run: |
          LOG_DIR=$(tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 "ls -td ~/simtest_logs/*/ | head -1")
          FAILED_TESTS=$(tsh -i ${{ steps.auth.outputs.identity-file }} ssh ubuntu@simtest-01 \
            "cd ~/sui && ./scripts/simtest/collect-failures.py '$LOG_DIR' | head -20")
          echo "failed_tests<<EOF" >> $GITHUB_OUTPUT
          echo "$FAILED_TESTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "log_dir=$LOG_DIR" >> $GITHUB_OUTPUT

    outputs:
      failed_tests: ${{ steps.failures.outputs.failed_tests }}
      log_dir: ${{ steps.failures.outputs.log_dir }}
      protocol_message: ${{ steps.protocol.outputs.protocol_message }}

  notify:
    name: Notify
    needs: [simtest]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && failure()

    steps:
    - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # Pin v4.1.1

    - name: Dispatch to sui-operations for notification
      uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
      with:
        token: ${{ secrets.DOCKER_BINARY_BUILDS_DISPATCH }}
        repository: MystenLabs/sui-operations
        event-type: simtest-failure
        client-payload: |-
          {
            "commit_sha": "${{ github.sha }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "run_id": "${{ github.run_id }}",
            "workflow_name": "${{ github.workflow }}",
            "workflow_conclusion": "${{ env.WORKFLOW_CONCLUSION }}",
            "protocol_message": "${{ needs.simtest.outputs.protocol_message }}",
            "failed_tests": ${{ toJSON(needs.simtest.outputs.failed_tests) }},
            "log_dir": "${{ needs.simtest.outputs.log_dir }}"
          }
