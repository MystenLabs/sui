name: Verus

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'consensus/**'
      - 'crates/sui-types/**'
      - 'crates/sui-core/**'
      - 'scripts/verus-check.sh'
      - '.github/workflows/verus.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  verus:
    runs-on: [ubuntu-latest]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Cache Verus binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/verus
          key: verus-0.2026.04.24.f8e1704-${{ runner.os }}-${{ runner.arch }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: verus-cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Verus verification
        run: ./scripts/verus-check.sh
