[package]
name = "sui-consistent-store"
version.workspace = true
authors = ["Mysten Labs <build@mystenlabs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bytes.workspace = true
parking_lot.workspace = true
prometheus.workspace = true
prost.workspace = true
rocksdb = { version = "0.22.0", default-features = false, features = ["snappy", "lz4", "zstd", "zlib", "multi-threaded-cf"] }
scoped-futures.workspace = true
sui-futures.workspace = true
sui-indexer-alt-framework = { workspace = true, default-features = false }
sui-indexer-alt-framework-store-traits.workspace = true
sui-types.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["rt", "sync"] }
tracing.workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
