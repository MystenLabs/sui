// On-wire representations of the framework's bookkeeping types.
//
// These messages back the column families auto-registered on every
// `sui_consistent_store::Db::open`:
//
// - `Watermark` is the per-pipeline progress record persisted in
//   the `__watermark` column family.
// - `RestoreState` is the per-pipeline bulk-load progress record
//   persisted in the `__restore` column family.
//
// The corresponding native Rust types in
// `sui_consistent_store::framework` remain the public API; these
// messages are the canonical on-disk format only.

syntax = "proto3";

package sui.db.v1alpha;

// Per-pipeline committer watermark.
//
// Holds the highest checkpoint each pipeline has committed plus the
// corresponding epoch, transaction count, and timestamp. Tip-mode
// drivers advance this atomically with each pipeline's data writes,
// and read it on restart to decide where to resume.
message Watermark {
  // Highest epoch number observed at or before
  // `checkpoint_hi_inclusive`.
  uint64 epoch_hi_inclusive = 1;
  // Inclusive upper bound of checkpoints whose effects are
  // persisted for this pipeline.
  uint64 checkpoint_hi_inclusive = 2;
  // Network-total transaction count at
  // `checkpoint_hi_inclusive`.
  uint64 tx_hi = 3;
  // Wall-clock timestamp (ms since epoch) of the checkpoint at
  // `checkpoint_hi_inclusive`.
  uint64 timestamp_ms_hi_inclusive = 4;
}

// Per-pipeline bulk-load progress record.
//
// Drivers transition a pipeline:
// 1. `None` â†’ `InProgress` when restore begins.
// 2. `InProgress` â†’ `InProgress` with per-shard cursors advanced
//    atomically with each shard's data writes.
// 3. `InProgress` â†’ `Complete` when every shard has been fully
//    consumed.
//
// Tip indexing for a pipeline must wait until its state reaches
// `Complete`. Drivers check this on startup.
message RestoreState {
  // Which lifecycle state the pipeline is currently in. The
  // `RestoreState` message itself is never empty in storage; an
  // absent column-family entry means "no restore has been
  // started", which is distinct from any of these variants.
  oneof state {
    InProgress in_progress = 1;
    Complete complete = 2;
  }

  // Restore has started for this pipeline but is not yet finished.
  message InProgress {
    // The checkpoint number the restore is aimed at. The restore
    // source dictates this value (the formal snapshot's anchor
    // checkpoint, or the validator's genesis-up-to checkpoint).
    // Tip indexing resumes at `target_checkpoint + 1` once the
    // pipeline reaches `Complete`.
    uint64 target_checkpoint = 1;

    // Per-shard restore progress for the source the driver was
    // run against. The key is the shard identifier the source
    // declared (`shard_id` argument to `RestoreSource::stream`).
    //
    // - An entry missing from the map means the shard has not
    //   been touched yet; the driver will open its stream with
    //   no cursor.
    // - `ShardProgress::in_progress` carries the opaque cursor
    //   the source produced; the driver hands it back to
    //   `RestoreSource::stream` to resume.
    // - `ShardProgress::done` records that the source's stream
    //   for this shard was exhausted; the driver skips it.
    //
    // The pipeline transitions to `Complete` once every shard
    // declared by the source is marked `done`.
    map<uint32, ShardProgress> shards = 2;
  }

  // Per-shard progress for a pipeline mid-restore.
  message ShardProgress {
    oneof state {
      // Opaque resume cursor: the driver will pass this back to
      // `RestoreSource::stream` to resume the shard from
      // immediately after the last committed chunk.
      bytes in_progress = 1;

      // The source's stream for this shard was fully consumed.
      Done done = 2;
    }

    message Done {}
  }

  // Restore has finished for this pipeline.
  message Complete {
    // The checkpoint number the pipeline was restored to. Tip
    // indexing resumes at `restored_at + 1`.
    uint64 restored_at = 1;
  }
}
