[package]
name = "sui-execution-backtest"
version = "0.1.0"
authors = ["Mysten Labs <build@mystenlabs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[[bin]]
name = "sui-execution-backtest"
path = "src/main.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bcs.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
diesel = { workspace = true, features = ["postgres_backend", "chrono"] }
diesel-async = { workspace = true, features = ["bb8", "postgres", "async-connection-wrapper"] }
diesel_migrations.workspace = true
object_store.workspace = true
prometheus.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "fs", "time"] }
tonic.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt"] }
url.workspace = true

move-core-types.workspace = true

sui-types.workspace = true
sui-protocol-config.workspace = true
sui-indexer-alt-framework = { workspace = true, default-features = false, features = ["postgres"] }
sui-rpc.workspace = true

sui-execution = { path = "../../sui-execution" }
