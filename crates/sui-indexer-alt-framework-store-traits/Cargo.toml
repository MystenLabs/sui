[package]
name = "sui-indexer-alt-framework-store-traits"
version.workspace = true
authors = ["Mysten Labs <build@mystenlabs.com>"]
license = "Apache-2.0"
publish = false
edition = "2024"

[features]
testing = ["dep:dashmap", "dep:tokio"]

[dependencies]
