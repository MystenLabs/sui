scoped-futures.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"], optional = true }

[dev-dependencies]
dashmap.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
