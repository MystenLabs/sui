syntax = "proto3";

package sui.rpc.kv.v2alpha;

import "google/protobuf/field_mask.proto";
import "sui/rpc/v2/event.proto";
import "sui/rpc/v2/executed_transaction.proto";

// ListService provides paginated, filtered access to transactions and events
// backed by the sui-kv BigTable schema's bitmap indices.
service ListService {
  // List transactions matching the provided filters, with pagination.
  //
  // Transactions are returned in checkpoint order, then by transaction
  // index within each checkpoint.
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);

  // List events matching the provided filters, with pagination.
  //
  // Events are returned in checkpoint order, then by transaction index,
  // then by event index within the transaction.
  rpc ListEvents(ListEventsRequest) returns (ListEventsResponse);
}

// Request message for ListService.ListTransactions.
message ListTransactionsRequest {
  // Optional. Mask for specifying which parts of the ExecutedTransaction
  // should be returned.
  optional google.protobuf.FieldMask read_mask = 1;

  // Optional. Start of the checkpoint range to query (inclusive).
  optional uint64 start_checkpoint = 2;

  // Optional. End of the checkpoint range to query (exclusive).
  // If not set, the query extends to the latest available checkpoint.
  optional uint64 end_checkpoint = 3;

  // Optional. Boolean expression tree over indexed dimensions.
  // If absent, all transactions in the range are returned.
  optional TransactionFilter filter = 4;

  // The maximum number of transactions to return. The service may return
  // fewer than this value. If unspecified, at most 50 transactions will be
  // returned. The maximum value is 1000; values above 1000 will be coerced
  // to 1000.
  optional uint32 page_size = 5;

  // A page token received from a previous ListTransactions call.
  // Provide this to retrieve the subsequent page.
  optional bytes page_token = 6;
}

// Response message for ListService.ListTransactions.
message ListTransactionsResponse {
  // The list of matching transactions.
  repeated TransactionResult transactions = 1;

  // A token which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  optional bytes next_page_token = 2;
}

// Request message for ListService.ListEvents.
message ListEventsRequest {
  // Optional. Mask for specifying which parts of the Event should be returned.
  optional google.protobuf.FieldMask read_mask = 1;

  // Optional. Start of the checkpoint range to query (inclusive).
  optional uint64 start_checkpoint = 2;

  // Optional. End of the checkpoint range to query (exclusive).
  // If not set, the query extends to the latest available checkpoint.
  optional uint64 end_checkpoint = 3;

  // Optional. Boolean expression tree over indexed dimensions.
  // If absent, all events in the range are returned.
  optional EventFilter filter = 4;

  // The maximum number of events to return. The service may return fewer
  // than this value. If unspecified, at most 50 events will be returned.
  // The maximum value is 1000; values above 1000 will be coerced to 1000.
  optional uint32 page_size = 5;

  // A page token received from a previous ListEvents call.
  // Provide this to retrieve the subsequent page.
  optional bytes page_token = 6;
}

// Response message for ListService.ListEvents.
message ListEventsResponse {
  // The list of matching events.
  repeated EventResult events = 1;

  // A token which can be sent as `page_token` to retrieve the next page.
  // If this field is omitted, there are no subsequent pages.
  optional bytes next_page_token = 2;
}

// Boolean expression tree for filtering transactions.
//
// Each node is either a combinator (And, Or, Not, Xor) over child expressions,
// or a leaf predicate matching a single indexed dimension. The bitmap index
// evaluates any combination of these efficiently.
//
// An absent filter matches everything.
message TransactionFilter {
  oneof filter {
    // All child expressions must match.
    TransactionAndFilter and = 1;

    // At least one child expression must match.
    TransactionOrFilter or = 2;

    // The child expression must not match.
    TransactionNotFilter not = 3;

    // Exactly one of the child expressions must match.
    TransactionXorFilter xor = 4;

    // Match transactions sent by the specified address.
    SenderFilter sender = 10;

    // Match transactions that transferred an object to the specified address.
    RecipientFilter recipient = 11;

    // Match transactions that read or modified the specified object.
    AffectedObjectFilter affected_object = 12;

    // Match transactions that made a Move call matching the specified filter.
    MoveCallFilter move_call = 13;

    // Match transactions that emitted an event from a module matching the
    // specified filter.
    EmitModuleFilter emit_module = 14;

    // Match transactions that emitted an event with a type matching the
    // specified filter.
    EventTypeFilter event_type = 15;
  }
}

// All child transaction filters must match.
message TransactionAndFilter {
  repeated TransactionFilter filters = 1;
}

// At least one child transaction filter must match.
message TransactionOrFilter {
  repeated TransactionFilter filters = 1;
}

// The child transaction filter must not match.
message TransactionNotFilter {
  optional TransactionFilter filter = 1;
}

// Exactly one of the child transaction filters must match.
message TransactionXorFilter {
  repeated TransactionFilter filters = 1;
}

// Boolean expression tree for filtering events.
//
// Each node is either a combinator (And, Or, Not, Xor) over child expressions,
// or a leaf predicate matching a single indexed dimension. Transaction-level
// predicates (sender, affected_object, move_call) narrow which transactions'
// events are considered; event-level predicates (emit_module, event_type)
// narrow which individual events match.
//
// An absent filter matches everything.
message EventFilter {
  oneof filter {
    // All child expressions must match.
    EventAndFilter and = 1;

    // At least one child expression must match.
    EventOrFilter or = 2;

    // The child expression must not match.
    EventNotFilter not = 3;

    // Exactly one of the child expressions must match.
    EventXorFilter xor = 4;

    // Match events from transactions sent by the specified address.
    SenderFilter sender = 10;

    // Match events from transactions that read or modified the specified object.
    AffectedObjectFilter affected_object = 11;

    // Match events from transactions that made a Move call matching the
    // specified filter.
    MoveCallFilter move_call = 12;

    // Match events emitted from a module matching the specified filter.
    EmitModuleFilter emit_module = 13;

    // Match events whose type matches the specified filter.
    EventTypeFilter event_type = 14;
  }
}

// All child event filters must match.
message EventAndFilter {
  repeated EventFilter filters = 1;
}

// At least one child event filter must match.
message EventOrFilter {
  repeated EventFilter filters = 1;
}

// The child event filter must not match.
message EventNotFilter {
  optional EventFilter filter = 1;
}

// Exactly one of the child event filters must match.
message EventXorFilter {
  repeated EventFilter filters = 1;
}

// --- Leaf predicates ---

// Match by transaction sender address.
message SenderFilter {
  // The sender address (hex-encoded).
  optional string address = 1;
}

// Match by recipient address (object transfer target).
message RecipientFilter {
  // The recipient address (hex-encoded).
  optional string address = 1;
}

// Match by affected object ID.
message AffectedObjectFilter {
  // The object ID (hex-encoded).
  optional string object_id = 1;
}

// Match by Move function call, specified as a `::`-delimited Move path.
//
// Specificity levels:
//   "0xpkg"                        -> matches any call in the package
//   "0xpkg::module"                -> matches any call in the module
//   "0xpkg::module::function"      -> matches calls to the exact function
message MoveCallFilter {
  // Required. Move path of the form `package[::module[::function]]`.
  optional string function = 1;
}

// Match by the module that emitted an event, specified as a `::`-delimited
// Move path.
//
// Specificity levels:
//   "0xpkg"               -> matches events emitted by any module in the package
//   "0xpkg::module"       -> matches events emitted by the specified module
message EmitModuleFilter {
  // Required. Move path of the form `package[::module]`.
  optional string module = 1;
}

// Match by event struct type, specified as a Move type string.
//
// Specificity levels:
//   "0xaddr"                              -> matches events whose type is defined at this address
//   "0xaddr::module"                      -> matches events whose type is in this module
//   "0xaddr::module::Name"                -> matches events with this type name (any instantiation)
//   "0xaddr::module::Name<T1, T2>"        -> matches events with this exact generic instantiation
message EventTypeFilter {
  // Required. Move type string of the form
  // `address[::module[::Name[<type_params>]]]`.
  optional string type = 1;
}

// --- Result wrappers ---

// A transaction result with ordering context.
message TransactionResult {
  // Cursor for resumption. Encodes checkpoint + transaction index position.
  optional bytes cursor = 1;

  // The checkpoint containing this transaction.
  optional uint64 checkpoint = 2;

  // The index of this transaction within the checkpoint (0-based).
  optional uint32 transaction_index = 3;

  // The requested transaction data.
  optional sui.rpc.v2.ExecutedTransaction transaction = 4;
}

// An event result with ordering context.
message EventResult {
  // Cursor for resumption. Encodes checkpoint + transaction index + event index.
  optional bytes cursor = 1;

  // The checkpoint containing the transaction that emitted this event.
  optional uint64 checkpoint = 2;

  // The index of the transaction within the checkpoint (0-based).
  optional uint32 transaction_index = 3;

  // The index of this event within the transaction's event list (0-based).
  optional uint32 event_index = 4;

  // The digest of the transaction that emitted this event.
  optional string transaction_digest = 5;

  // The event data.
  optional sui.rpc.v2.Event event = 6;
}
