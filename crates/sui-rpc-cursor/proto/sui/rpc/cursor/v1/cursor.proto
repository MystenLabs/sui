syntax = "proto3";

package sui.rpc.cursor.v1;

// Whether `position` is a matched row returned to the client or a scan frontier the server reached.
enum CursorKind {
    CURSOR_KIND_UNSPECIFIED = 0;
    // A matched row returned to the client. Resume strictly after this position.
    CURSOR_KIND_ITEM = 1;
    // A scan frontier the server reached. Resume at this position for ascending scans;
    // before-cursor bounds exclude this position for both item and boundary cursors.
    CURSOR_KIND_BOUNDARY = 2;
}

// Pagination cursor for ledger-history endpoints. The cursor scope is encoded
// by which `position` member is set.
message CursorToken {
    // Orthogonal to `position`: the same coordinate can be either a returned
    // item or a scan boundary, with different resume inclusivity.
    CursorKind kind = 1;

    // Coordinate schema / endpoint scope. This does not imply Item vs Boundary.
    oneof position {
        CheckpointsPosition checkpoints = 2;
        TransactionsPosition transactions = 3;
        EventsPosition events = 4;
    }
}

message CheckpointsPosition {
    // Checkpoint sequence coordinate. Item cursors resume strictly after it.
    // Boundary cursors resume at it ascending / strictly below it descending.
    optional uint64 checkpoint = 1;
}

message TransactionsPosition {
    // Checkpoint containing or bounding the transaction sequence position.
    optional uint64 checkpoint = 1;
    // Global transaction sequence number. Item cursors resume strictly after it;
    // Boundary cursors resume at it.
    optional uint64 tx_seq = 2;
}

message EventsPosition {
    // Checkpoint containing or bounding the event position.
    optional uint64 checkpoint = 1;
    // Global transaction sequence number.
    optional uint64 tx_seq = 2;
    // Index of the event within its transaction.
    optional uint32 event_index = 3;
}

// Event cursors are ordered lexicographically by `(tx_seq, event_index)`.
// Item cursors resume strictly after the event. Boundary cursors resume at the
// event coordinate; the start of transaction N is `{ tx_seq: N, event_index: 0 }`.
// `before` cursors bound the scan exclusively at the event coordinate for both
// Item and Boundary kinds.
