# Concept coverage map for docs auditing.
#
# Each concept lists:
#   must_appear_in  – pages that MUST cover this concept
#   terms           – keywords the audit script checks for (case-insensitive)
#
# A page passes if it contains >= half of the listed terms.
# A page NOT listed in must_appear_in is flagged as an orphan if it contains >= 75% of the terms.

