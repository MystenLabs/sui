# Concept coverage map for docs auditing.
#
# Each concept lists:
#   must_appear_in  – pages that MUST cover this concept
#   terms           – keywords the audit script checks for (case-insensitive)
#
# A page passes if it contains >= half of the listed terms.
# A page NOT listed in must_appear_in is flagged as an orphan if it contains >= 75% of the terms.

concepts:

  sui-install:
    must_appear_in:
      - "getting-started/onboarding/sui-install.mdx"
    terms:
      - "suiup"
      - "sui --version"
      - "install"
      - "prerequisites"

  sui-client-config:
    must_appear_in:
      - "getting-started/onboarding/configure-sui-client.mdx"
    terms:
      - "sui client"
      - "client.yaml"
      - "envs"
      - "switch"

  sui-address:
    must_appear_in:
      - "getting-started/onboarding/get-address.mdx"
      - "getting-started/onboarding/configure-sui-client.mdx"
    terms:
      - "address"
      - "0x"
      - "sui client new-address"
      - "recovery phrase"
      - "keystore"

  gas-and-faucet:
    must_appear_in:
      - "getting-started/onboarding/get-coins.mdx"
      - "getting-started/onboarding/hello-world.mdx"
    terms:
