<svg width="860" height="580" viewBox="0 0 860 580" role="img" font-family="Inter, system-ui, sans-serif" font-size="14" xmlns="http://www.w3.org/2000/svg"><title>Custom indexer architecture</title><defs><marker id="sync" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#298DFF"></path></marker><marker id="async" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10" fill="none" stroke="#298DFF" stroke-width="1.5"></path></marker></defs><rect x="0" y="0" width="860" height="580" fill="#FFFFFF"></rect><text x="40" y="28" fill="#000000" font-family="Inter, system-ui, sans-serif" font-size="12">Data sources</text><g><rect x="41" y="41" width="178" height="54" fill="none" stroke="#6C7584" stroke-width="1.5" stroke-dasharray="6 4"></rect><text x="130" y="68" fill="#000000" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="13">Remote stores</text></g><g><rect x="241" y="41" width="178" height="54" fill="none" stroke="#6C7584" stroke-width="1.5" stroke-dasharray="6 4"></rect><text x="330" y="68" fill="#000000" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="13">Local files</text></g><g><rect x="441" y="41" width="178" height="54" fill="none" stroke="#6C7584" stroke-width="1.5" stroke-dasharray="6 4"></rect><text x="530" y="68" fill="#000000" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="13">RPC endpoint</text></g><g><rect x="641" y="41" width="178" height="54" fill="none" stroke="#6C7584" stroke-width="1.5" stroke-dasharray="6 4"></rect><text x="730" y="68" fill="#000000" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="13">gRPC streaming</text></g><g><text x="290" y="152" fill="#000000" font-family="Inte