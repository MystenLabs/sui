<svg width="840" height="460" viewBox="0 0 840 460" role="img" font-family="Inter, system-ui, sans-serif" font-size="14" xmlns="http://www.w3.org/2000/svg"><title>User-proposed sponsored transaction</title><defs><marker id="sync" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#298DFF"></path></marker><marker id="async" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10" fill="none" stroke="#298DFF" stroke-width="1.5"></path></marker></defs><rect x="0" y="0" width="840" height="460" fill="#FFFFFF"></rect><g><rect x="80" y="40" width="120" height="40" fill="#000000"></rect><text x="140" y="60" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5">USER</text></g><g><rect x="360" y="40" width="120" height="40" fill="#6C7584"></rect><text x="420" y="60" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5">SPONSOR</text></g><g><rect x="640" y="40" width="120" height="40" fill="#6C7584"></rect><text x="700" y="60" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" letter-spacing="0.5">SUI NETWORK</text></g><line x1="140" y1="80" x2="140" y2="420" stroke="#6C7584" stroke-width="1" stroke-dasharray="4 4"></line><line x1="420" y1="80" x2="420" y2="420" stroke="#6C7584" stroke-width="1" stroke-dasharray="4 4"></line><line x1="700" y1="80" x2="700" y2="420" stroke="#6C7584" stroke-width="1" stroke-dasharray="4 4"></line><g><rect x="22" y="108" width="236" height="28" fill="#000000"></rect><text x="140" y="122" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">1. Init GasLessTransactionData</text></g><text x="280" y="186" fill="#1759C4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">2. Send GasLessTransactionData</text><g><line x1="145" y1="200" x2="416" y2="200" stroke="#298DFF" stroke-width="1.5" marker-end="url(#sync)"></line></g><g><rect x="258.79999999999995" y="232" width="322.40000000000003" height="28" fill="#000000"></rect><text x="420" y="246" fill="#FFFFFF" text-anchor="middle" dominant-baseline="central" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="500">3. Validate · build TransactionData · sign</text></g><text x="280" y="322" fill="#1759C4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">4. Return signed TransactionData</text><g><line x1="415" y1="336" x2="144" y2="336" stroke="#298DFF" stroke-width="1.5" marker-end="url(#async)" stroke-dasharray="6 4"></line></g><text x="420" y="376" fill="#1759C4" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12">5. Submit dual-signed transaction</text><g><line x1="145" y1="390" x2="696" y2="390" stroke="#298DFF" stroke-width="1.5" marker-end="url(#sync)"></line></g></svg>