# docs::#resolve-graphql
query ResolveName($name: String!) {
  address(name: $name) {
    address
  }
}
# docs::/#resolve-graphql

# docs::#reverse-graphql
query ReverseLookup($address: SuiAddress!) {
  address(address: $address) {
    defaultNameRecord {
      domain
    }
  }
}
# docs::/#reverse-graphql
